<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  <g transform="translate(256, 256)">
    <!-- Crescent / Soil base -->
    <path d="M -80 60 C -30 90 30 90 80 60 C 40 110 -40 110 -80 60 Z" fill="#475569" opacity="0.5"/>
    
    <!-- Main Leaf Right -->
    <path d="M 0 60 C 80 60 140 -20 120 -120 C 60 -100 0 -20 0 60 Z" fill="url(#grad1)" filter="url(#glow)"/>
    
    <!-- Secondary Leaf Left -->
    <path d="M 0 50 C -60 50 -100 -10 -80 -80 C -40 -70 0 -10 0 50 Z" fill="url(#grad2)" opacity="0.9"/>
    
    <!-- Sprout / Center Spark -->
    <circle cx="0" cy="-30" r="8" fill="#a7f3d0" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
